# Модель для бенчмарка
model_name: "Qwen/Qwen3.5-9B"
model_revision: null

# LLM агента (для принятия решений — любой OpenAI-совместимый endpoint)
# api_key читается из переменной окружения OPENAI_API_KEY (или укажи свою через api_key_env).
# Можно также явно положить ключ в api_key (не рекомендуется коммитить).
agent_llm:
  base_url: "https://api.openai.com/v1"
  model: "gpt-4o-mini"
  api_key_env: "OPENAI_API_KEY"
  temperature: 0.0
  # "json_schema" — strict structured outputs (рекомендуется для OpenAI и совр. провайдеров)
  # "json_object" — fallback: схема инлайнится в промпт, провайдер только гарантирует JSON
  structured_output_mode: "json_schema"

# Docker
docker:
  vllm_image: "vllm/vllm-openai:latest"
  sglang_image: "lmsysorg/sglang:latest"
  network: "host"
  shm_size: "16g"
  model_cache_dir: "/root/.cache/huggingface"

  # Фиксированные аргументы, которые всегда добавляются к docker run
  # (не перебираются LLM, передаются как есть)
  vllm_extra_args:
    - "--enable-auto-tool-choice"
    - "--tool-call-parser"
    - "qwen3_coder"
    - "--reasoning-parser"
    - "qwen3"
  sglang_extra_args:
    - "--reasoning-parser"
    - "qwen3"
    - "--tool-call-parser"
    - "qwen3_coder"

# Бенчмарк
benchmark:
  warmup_requests: 10
  concurrency_levels: [1, 4, 16, 64, 128, 256, 512]
  prompt_lengths: [128, 512, 2048, 4096, 32768, 65536, 100000]
  max_output_tokens: 256
  long_context_max_output_tokens: 8192
  duration_per_level_sec: 60
  timeout_sec: 600
  latency_threshold_ms: 500

# Эксперименты
experiments:
  max_experiments: 30
  plateau_threshold: 0.02
  plateau_window: 5
  engines: ["vllm", "sglang"]

# Storage
storage:
  experiments_dir: "./experiments"
  logs_dir: "./logs"

# Инструкции для LLM планировщика на естественном языке.
# Пиши сюда на какие параметры обратить внимание, что попробовать,
# что пропустить и т.д.
planner_instructions: |
  Делай все на свое усмотрение

