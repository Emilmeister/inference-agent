# Модель для бенчмарка
model_name: "Qwen/Qwen3.5-9B"
model_revision: null

# LLM агента (для принятия решений — Claude Code CLI)
agent_llm:
  model: "claude-opus-4-7"

# Docker
docker:
  vllm_image: "vllm/vllm-openai:latest"
  sglang_image: "lmsysorg/sglang:latest"
  network: "host"
  shm_size: "16g"
  model_cache_dir: "/root/.cache/huggingface"

  # Фиксированные аргументы, которые всегда добавляются к docker run
  # (не перебираются LLM, передаются как есть)
  vllm_extra_args:
    - "--enable-auto-tool-choice"
    - "--tool-call-parser"
    - "qwen3_coder"
    - "--reasoning-parser"
    - "qwen3"
  sglang_extra_args:
    - "--reasoning-parser"
    - "qwen3"
    - "--tool-call-parser"
    - "qwen3_coder"

# Бенчмарк
benchmark:
  warmup_requests: 10
  concurrency_levels: [1, 4, 16, 64, 128, 256, 512]
  prompt_lengths: [128, 512, 2048, 4096, 32768, 65536, 100000]
  max_output_tokens: 256
  long_context_max_output_tokens: 8192
  duration_per_level_sec: 60
  timeout_sec: 600
  latency_threshold_ms: 500

# Эксперименты
experiments:
  max_experiments: 30
  plateau_threshold: 0.02
  plateau_window: 5
  engines: ["vllm", "sglang"]

# Storage
storage:
  experiments_dir: "./experiments"
  logs_dir: "./logs"

# Инструкции для LLM планировщика на естественном языке.
# Пиши сюда на какие параметры обратить внимание, что попробовать,
# что пропустить и т.д.
planner_instructions: |
  Дополнительно оцени какой прирост даст MTP
  `python -m sglang.launch_server --model-path Qwen/Qwen3.5-9B --port 8000 --tp-size 1 --mem-fraction-static 0.8 --context-length 262144 --reasoning-parser qwen3 --speculative-algo NEXTN --speculative-num-steps 3 --speculative-eagle-topk 1 --speculative-num-draft-tokens 4`
  А для vllm оцени какой прирост дает --language-model-only

