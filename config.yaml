# Модель для бенчмарка
model_name: "google/gemma-4-31B-it"
model_revision: null

# LLM агента (для принятия решений — любой OpenAI-совместимый endpoint)
# api_key читается из переменной окружения OPENAI_API_KEY (или укажи свою через api_key_env).
# Можно также явно положить ключ в api_key (не рекомендуется коммитить).
agent_llm:
  base_url: "https://api.openai.com/v1"
  model: "gpt-4o-mini"
  api_key_env: "OPENAI_API_KEY"
  temperature: 0.0
  # "json_schema" — strict structured outputs (рекомендуется для OpenAI и совр. провайдеров)
  # "json_object" — fallback: схема инлайнится в промпт, провайдер только гарантирует JSON
  structured_output_mode: "json_schema"

# Docker
docker:
  vllm_image: "vllm/vllm-openai:latest-cu130"
  sglang_image: "lmsysorg/sglang:dev-cu13-gemma4"
  network: "host"
  shm_size: "16g"
  model_cache_dir: "/root/.cache/huggingface"

  # Фиксированные аргументы, которые всегда добавляются к docker run
  # (не перебираются LLM, передаются как есть)
  vllm_extra_args:
    - "--enable-auto-tool-choice"
    - "--tool-call-parser"
    - "gemma4"
    - "--reasoning-parser"
    - "gemma4"
    - "--chat-template"
    - "examples/tool_chat_template_gemma4.jinja"
  sglang_extra_args:
    - "--reasoning-parser"
    - "gemma4"
    - "--tool-call-parser"
    - "gemma4"

# Поведение при старте движка (healthcheck, pull образа).
# Бюджет ожидания ограничен двумя часами:
#   hard_timeout_sec — абсолютный потолок ожидания /health = 200.
#   idle_timeout_sec — если в логах контейнера нет нового маркера прогресса
#     (loading weights, capturing cuda graph, ...) дольше этого времени —
#     считаем, что движок завис, и абортим.
# Idle-таймер сбрасывается на каждом новом маркере, поэтому большие модели
# (60+ GB), которые честно грузятся 20+ минут с диска, успешно стартуют —
# нужно лишь поднять hard_timeout_sec.
startup:
  hard_timeout_sec: 1800       # 30 мин — увеличь если модель большая (60GB+ → 3600+)
  idle_timeout_sec: 300        # 5 мин без прогресса в логах = stall
  log_scan_interval_sec: 10.0
  image_pull_timeout_sec: 900  # 15 мин на docker pull образа движка
  docker_run_timeout_sec: 180  # 3 мин на сам `docker run -d` (без healthcheck);
                               # бамп если видишь startup_timeout при локально присутствующем образе

# Бенчмарк
benchmark:
  warmup_requests: 10
  # Сжатая сетка: один низкий c для latency, два mid/high для throughput,
  # один на границе насыщения. Промежуточные [4, 16, 128, 512] выкинуты —
  # 4/16 редко добавляют сигнал поверх 1/64, 512 = stress (не учитывается
  # в peak_throughput), 128 близко к 64/256.
  concurrency_levels: [1, 16, 64, 256]
  # Три длины: одна короткая, одна средняя, одна длинная (RAG-сценарии).
  # Long-context фазы используют отдельный sweep concurrencies (см. runner.py).
  prompt_lengths: [512, 4096, 32768]
  max_output_tokens: 256
  long_context_max_output_tokens: 8192
  # 30 сек на фазу вместо 60 — пополам общее время. Дисперсия per-request
  # (cv) уже считается и попадает в score-derate, так что более короткие
  # окна не дают шумным конфигам выигрывать на малой выборке.
  duration_per_level_sec: 30
  timeout_sec: 600
  # SLO для balanced-цели: верхняя граница TTFT p95, при которой
  # конфигурация считается допустимой для прода. Analyzer ищет максимум
  # throughput среди фаз, укладывающихся в этот порог.
  latency_threshold_ms: 2000

# Эксперименты
experiments:
  max_experiments: 30
  plateau_threshold: 0.02
  plateau_window: 5
  engines: ["vllm", "sglang"]

# Storage (logs only; experiment results go to Postgres — см. секцию database)
storage:
  logs_dir: "./logs"

# Postgres для хранения экспериментов и подгрузки топов между запусками.
# Все поля можно переопределить env-переменными DATABASE_<UPPER> (например
# DATABASE_HOST, DATABASE_PORT). Пароль читается из DB_PASSWORD по умолчанию;
# поменяй password_env, если хочешь другую переменную.
database:
  host: "localhost"
  port: 5432
  database: "inference_agent"
  user: "inference_agent"
  password_env: "DB_PASSWORD"
  pool_size: 5
  echo: false

# Инструкции для LLM планировщика на естественном языке.
# Пиши сюда на какие параметры обратить внимание, что попробовать,
# что пропустить и т.д.
planner_instructions: |
  Оптимизируй на свое усмотрение

